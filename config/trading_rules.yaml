account:
  starting_capital_usd: 10
  margin_per_trade_usd: 2
  max_position_value_usd: 20

execution:
  exchange: hyperliquid
  leverage: 10
  max_open_positions: 1
  use_limit_entry: true
  use_market_stop: true
  auto_execution_enabled: false
  require_manual_approval: true

markets:
  allowed:
    - BTC
    - ETH
    - SOL
    - HYPE
  avoid_low_liquidity: true
  avoid_high_spread: true

risk:
  max_stop_loss_pct: 0.5
  min_take_profit_pct: 1.2
  min_risk_reward: 2
  max_daily_loss_usd: 0.5
  max_trades_per_day: 3
  max_consecutive_losses: 2
  cooldown_after_loss_minutes: 30

scanner:
  min_signal_score: 80
  timeframes:
    - 5m
    - 15m
    - 1h
  scan_interval_minutes: 3
